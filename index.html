<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulys — Платформа для подростков Казахстана</title>
    
    <!-- Подключаем Tailwind CSS для стилей -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Подключаем React и Babel (чтобы браузер понимал современный JS) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Базовые настройки для того, чтобы приложение выглядело как мобильное */
        body {
            font-family: 'Arimo', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }
        #root {
            min-height: 100vh;
        }
        /* Убираем стандартные полосы прокрутки */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <!-- Сюда React "вставит" всё наше приложение -->
    <div id="root"></div>

    <!-- 
        ВАЖНО: Мы подключаем файл App.js как тип "text/babel". 
        GitHub Pages найдет этот файл в той же папке и запустит его.
    -->
    <script type="text/babel" src="App.js"></script>
</body>
</html>
